name: Release Workflow
run-name: Release ${{ github.event.inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version must match vX.Y.Z (e.g. v1.0.0)"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0

      - name: Create release and upload scripts
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            bin/cloudgate.sh
            bin/cloudgate-saml.sh
            bin/eks-allowip.sh

      - name: Calculate SHA256
        id: sha256
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TARBALL="cloudgate-${VERSION}.tar.gz"
          curl -sSL -o "$TARBALL" "https://github.com/FathAllaTechOps/cloudgate/archive/${VERSION}.tar.gz"
          SHA=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
          echo "SHA256: $SHA"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          SHA="${{ steps.sha256.outputs.sha256 }}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/FathAllaTechOps/homebrew-cloudgate.git"
          cd homebrew-cloudgate

          sed -i "s|url \".*\"|url \"https://github.com/FathAllaTechOps/cloudgate/archive/${VERSION}.tar.gz\"|" Formula/cloudgate.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/cloudgate.rb
          sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/cloudgate.rb

          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add Formula/cloudgate.rb
          git commit -m "bump cloudgate to ${VERSION}"
          git push
